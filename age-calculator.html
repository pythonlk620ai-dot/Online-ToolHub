<body>
    <div class="container">
        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">中文繁體</option>
            </select>
        </div>
        <header>
            <h1>🎂 Age Calculator</h1>
            <a href="index.html">← Back to Home</a>
        </header>
        
        <div class="calculator">
            <div class="input-group">
                <label for="birthdate">Birth Date</label>
                <input type="date" id="birthdate">
            </div>
            
            <button class="btn-calculate" onclick="calculateAge()">Calculate Age</button>
            <div class="error-message" id="errorMessage"></div>
        </div>
        
        <div class="results" id="results" style="display: none;">
            <h3>📊 Your Age</h3>
            
            <div class="result-grid">
                <div class="result-card">
                    <div class="label">Years</div>
                    <div class="value" id="years">0</div>
                    <div class="unit">years</div>
                </div>
                <div class="result-card">
                    <div class="label">Months</div>
                    <div class="value" id="months">0</div>
                    <div class="unit">months</div>
                </div>
                <div class="result-card">
                    <div class="label">Days</div>
                    <div class="value" id="days">0</div>
                    <div class="unit">days</div>
                </div>
            </div>
            
            <div class="extra-info">
                <h4>📅 Additional Information</h4>
                <div class="extra-grid">
                    <div class="extra-item">
                        <div class="label">Next Birthday</div>
                        <div class="value" id="nextBirthday">-</div>
                    </div>
                    <div class="extra-item">
                        <div class="label">Total Days Lived</div>
                        <div class="value" id="totalDays">0</div>
                    </div>
                    <div class="extra-item">
                        <div class="label">Weeks Lived</div>
                        <div class="value" id="totalWeeks">0</div>
                    </div>
                    <div class="extra-item">
                        <div class="label">Birth Day</div>
                        <div class="value" id="birthDay">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-tools">
        <button class="footer-tool" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>
 
    </div>
    
    <script>
        const birthdateInput = document.getElementById('birthdate');
        const results = document.getElementById('results');
        const errorMessage = document.getElementById('errorMessage');
        
        function calculateAge() {
            const birthdateValue = birthdateInput.value;
            
            if (!birthdateValue) {
                showError('Please enter your birth date');
                return;
            }
            
            const birthdate = new Date(birthdateValue);
            const today = new Date();
            
            if (birthdate > today) {
                showError('Birth date cannot be in the future');
                return;
            }
            
            if (birthdate.getFullYear() < 1900) {
                showError('Please enter a valid birth date');
                return;
            }
            
            hideError();
            
            let years = today.getFullYear() - birthdate.getFullYear();
            let months = today.getMonth() - birthdate.getMonth();
            let days = today.getDate() - birthdate.getDate();
            
            if (days < 0) {
                months--;
                const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += lastMonth.getDate();
            }
            
            if (months < 0) {
                years--;
                months += 12;
            }
            
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;
            
            calculateAdditionalInfo(birthdate, today, years);
            
            results.style.display = 'block';
        }
        
        function calculateAdditionalInfo(birthdate, today, years) {
            const totalDays = Math.floor((today - birthdate) / (1000 * 60 * 60 * 24));
            const totalWeeks = Math.floor(totalDays / 7);
            
            document.getElementById('totalDays').textContent = totalDays.toLocaleString();
            document.getElementById('totalWeeks').textContent = totalWeeks.toLocaleString();
            
            const birthDayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const birthDayName = birthDayNames[birthdate.getDay()];
            document.getElementById('birthDay').textContent = birthDayName;
            
            const nextBirthday = new Date(today.getFullYear(), birthdate.getMonth(), birthdate.getDate());
            if (nextBirthday < today) {
                nextBirthday.setFullYear(today.getFullYear() + 1);
            }
            
            const daysUntilBirthday = Math.floor((nextBirthday - today) / (1000 * 60 * 60 * 24));
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const nextBirthdayStr = `${monthNames[nextBirthday.getMonth()]} ${nextBirthday.getDate()}, ${nextBirthday.getFullYear()}`;
            document.getElementById('nextBirthday').textContent = `${nextBirthdayStr} (${daysUntilBirthday} days)`;
        }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            results.style.display = 'none';
        }
        
        function hideError() {
            errorMessage.classList.remove('show');
        }
        
        const translations = {
            en: {
                title: 'Age Calculator',
                back: '← Back to Home',
                birthDate: 'Birth Date',
                calculate: 'Calculate Age',
                yourAge: 'Your Age',
                years: 'Years',
                months: 'Months',
                days: 'Days',
                nextBirthday: 'Next Birthday',
                daysUntil: 'days until',
                totalDays: 'Total Days Lived',
                totalWeeks: 'Total Weeks Lived',
                birthDay: 'Birth Day',
                nextBirthdayLabel: '-'
            },
            'zh-CN': {
                title: '年龄计算器',
                back: '← 返回首页',
                birthDate: '出生日期',
                calculate: '计算年龄',
                yourAge: '您的年龄',
                years: '岁',
                months: '个月',
                days: '天',
                nextBirthday: '下一个生日',
                daysUntil: '天后',
                totalDays: '总天数',
                totalWeeks: '总周数',
                birthDay: '出生日',
                nextBirthdayLabel: '-'
            },
            'zh-TW': {
                title: '年齡計算器',
                back: '← 返回首頁',
                birthDate: '出生日期',
                calculate: '計算年齡',
                yourAge: '您的年齡',
                years: '歲',
                months: '個月',
                days: '天',
                nextBirthday: '下一個生日',
                daysUntil: '天後',
                totalDays: '總天數',
                totalWeeks: '總周數',
                birthDay: '出生日',
                nextBirthdayLabel: '-'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            document.querySelector('a').textContent = t.back;
            
            const labels = document.querySelectorAll('.calculator label');
            labels[0].textContent = t.birthDate;
            
            const buttons = document.querySelectorAll('.btn-calculate');
            buttons[0].textContent = t.calculate;
            
            const resultHeaders = document.querySelectorAll('.results h3');
            resultHeaders[0].textContent = t.yourAge;
            
            const resultLabels = document.querySelectorAll('.result-card .label');
            resultLabels[0].textContent = t.years;
            resultLabels[1].textContent = t.months;
            resultLabels[2].textContent = t.days;
            
            const extraHeaders = document.querySelectorAll('.extra-info h4');
            extraHeaders[0].textContent = t.nextBirthday;
            
            const extraLabels = document.querySelectorAll('.extra-item .label');
            extraLabels[0].textContent = t.nextBirthday;
            extraLabels[1].textContent = t.totalDays;
            extraLabels[2].textContent = t.totalWeeks;
            extraLabels[3].textContent = t.birthDay;
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
        
        birthdateInput.addEventListener('input', hideError);
    </script>
</body>
