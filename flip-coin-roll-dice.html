    <script>
        let currentMode = 'coin';
        let isAnimating = false;
        let history = [];
        let currentLang = 'en';
        
        const translations = {
            en: {
                title: 'Flip a Coin / Roll a Die',
                back: '← Back to Home',
                coinTitle: 'Flip Coin',
                dieTitle: 'Roll Die',
                flip: '🪙 Flip',
                roll: '🎲 Roll',
                reset: 'Reset',
                history: 'History',
                coinFront: 'Heads',
                coinBack: 'Tails',
                coinFace: '🪙',
                dieFace: '🎲'
            },
            'zh-CN': {
                title: '抛硬币 / 掷骰子',
                back: '← 返回首页',
                coinTitle: '抛硬币',
                dieTitle: '掷骰子',
                flip: '🪙 抛',
                roll: '🎲 掷',
                reset: '重置',
                history: '历史记录',
                coinFront: '正面',
                coinBack: '反面',
                coinFace: '🪙',
                dieFace: '🎲'
            },
            'zh-TW': {
                title: '拋硬幣 / 掷骰子',
                back: '← 返回首頁',
                coinTitle: '拋硬幣',
                dieTitle: '掷骰子',
                flip: '🪙 拋',
                roll: '🎲 掷',
                reset: '重置',
                history: '歷史記錄',
                coinFront: '正面',
                coinBack: '反面',
                coinFace: '🪙',
                dieFace: '🎲'
            }
        };
        
        function setMode(mode) {
            if (isAnimating) return;
            
            currentMode = mode;
            
            const coinCard = document.getElementById('coinCard');
            const dieCard = document.getElementById('dieCard');
            const coinTitle = document.getElementById('coinTitle');
            const dieTitle = document.getElementById('dieTitle');
            const coin = document.getElementById('coin');
            const die = document.getElementById('die');
            const actionBtn = document.getElementById('actionBtn');
            const t = translations[currentLang];
            
            if (mode === 'coin') {
                coinCard.classList.add('active');
                dieCard.classList.remove('active');
                coinTitle.textContent = t.coinTitle;
                dieTitle.textContent = t.dieTitle;
                coin.style.display = 'block';
                die.style.display = 'none';
                actionBtn.textContent = t.flip;
            } else {
                coinCard.classList.remove('active');
                dieCard.classList.add('active');
                coinTitle.textContent = t.coinTitle;
                dieTitle.textContent = t.dieTitle;
                coin.style.display = 'none';
                die.style.display = 'block';
                actionBtn.textContent = t.roll;
            }
            
            updateLanguage();
        }
        
        function performAction() {
            if (isAnimating) return;
            
            isAnimating = true;
            const t = translations[currentLang];
            
            if (currentMode === 'coin') {
                const coinInner = document.getElementById('coinInner');
                coinInner.classList.add('flipping');
                
                setTimeout(() => {
                    const result = Math.random() < 0.5 ? 'front' : 'back';
                    const rotateY = result === 'front' ? 0 : 180;
                    coinInner.style.transform = `rotateY(${rotateY}deg)`;
                    coinInner.classList.remove('flipping');
                    
                    const resultText = result === 'front' ? t.coinFront : t.coinBack;
                    const resultIcon = t.coinFace;
                    addToHistory(resultIcon + ' ' + resultText);
                    isAnimating = false;
                }, 600);
                
            } else {
                const dieInner = document.getElementById('dieInner');
                dieInner.classList.add('rolling');
                
                setTimeout(() => {
                    const result = Math.floor(Math.random() * 6) + 1;
                    
                    const rotations = {
                        1: { x: 0, y: 0 },
                        2: { x: 0, y: -90 },
                        3: { x: 0, y: 180 },
                        4: { x: 0, y: 90 },
                        5: { x: -90, y: 0 },
                        6: { x: 90, y: 0 }
                    };
                    
                    const rotation = rotations[result];
                    dieInner.style.transform = `rotateX(${rotation.x}deg) rotateY(${rotation.y}deg)`;
                    dieInner.classList.remove('rolling');
                    
                    addToHistory(t.dieFace + ' ' + result);
                    isAnimating = false;
                }, 500);
            }
        }
        
        function addToHistory(item) {
            history.unshift(item);
            if (history.length > 20) {
                history = history.slice(0, 20);
            }
            
            const historyList = document.getElementById('historyList');
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.textContent = item;
            historyList.prepend(historyItem);
            
            if (historyList.children.length > 20) {
                historyList.lastElementChild.remove();
            }
        }
        
        function resetGame() {
            if (isAnimating) return;
            
            const coinInner = document.getElementById('coinInner');
            const dieInner = document.getElementById('dieInner');
            
            coinInner.style.transform = 'rotateY(0deg)';
            coinInner.classList.remove('flipping');
            dieInner.style.transform = 'rotateX(0deg) rotateY(0deg)';
            dieInner.classList.remove('rolling');
            
            document.getElementById('historyList').innerHTML = '';
            history = [];
        }
        
        function updateLanguage() {
            const t = translations[currentLang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            document.querySelector('a').textContent = t.back;
            document.getElementById('historyTitle').textContent = t.history;
            
            if (currentMode === 'coin') {
                document.getElementById('coinTitle').textContent = t.coinTitle;
                document.getElementById('dieTitle').textContent = t.dieTitle;
                document.getElementById('actionBtn').textContent = t.flip;
            } else {
                document.getElementById('coinTitle').textContent = t.coinTitle;
                document.getElementById('dieTitle').textContent = t.dieTitle;
                document.getElementById('actionBtn').textContent = t.roll;
            }
        }
        
        function changeLanguage(lang) {
            currentLang = lang;
            updateLanguage();
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        currentLang = savedLang;
        document.getElementById('languageSelect').value = savedLang;
        updateLanguage();
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
