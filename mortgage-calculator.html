        .chart-bar.principal {
            background: linear-gradient(to top, #667eea 0%, #764ba2 100%);
        }
        .chart-bar.interest {

        }
        .chart-bar .tooltip {
            position: absolute;

        .chart-labels {

<body>
    <div class="container">
        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">中文繁體</option>
            </select>
        </div>
        <header>
            <h1>💰 Mortgage Calculator</h1>
            <a href="index.html">← Back to Home</a>
        </header>
        
        <div class="calculator">
            <div class="input-group">
                <label>Loan Amount</label>
                <input type="number" id="loanAmount" min="1000" max="10000000" value="300000" placeholder="Enter loan amount">
            </div>
            
            <div class="slider-container">
                <label>Interest Rate</label>
                <input type="range" id="interestRate" min="0.1" max="20" step="0.1" value="5.0">
                <div class="slider-value" id="interestRateValue">5.0%</div>
            </div>
            
            <div class="slider-container">
                <label>Loan Term</label>
                <input type="range" id="loanTerm" min="1" max="50" step="1" value="30">
                <div class="slider-value" id="loanTermValue">30 years</div>
            </div>
            
            <button class="btn-calculate" onclick="calculateMortgage()">📊 Calculate</button>
        </div>
        
        <div class="results" id="results" style="display: none;">
            <h3>📊 Calculation Results</h3>
            
            <div class="result-grid">
                <div class="result-card primary highlight">
                    <div class="label">Monthly Payment</div>
                    <div class="value" id="monthlyPayment">$0</div>
                </div>
                <div class="result-card">
                    <div class="label">Total Payment</div>
                    <div class="value" id="totalPayment">$0</div>
                </div>
                <div class="result-card">
                    <div class="label">Total Interest</div>
                    <div class="value" id="totalInterest">$0</div>
                </div>
                <div class="result-card">
                    <div class="label">Payoff Date</div>
                    <div class="value" id="payoffDate">-</div>
                </div>
            </div>
            
            <div class="breakdown">
                <h4>📊 Payment Breakdown</h4>
                <div class="breakdown-item">
                    <span class="label">Principal</span>
                    <span class="value" id="breakdownPrincipal">$0</span>
                </div>
                <div class="breakdown-item">
                    <span class="label">Interest</span>
                    <span class="value" id="breakdownInterest">$0</span>
                </div>
            </div>
            
            <div class="chart-container" id="chartContainer">
                <div class="chart-bar principal" id="chartPrincipal" style="height: 50%;">
                    <div class="tooltip" id="tooltipPrincipal">Principal</div>
                </div>
                <div class="chart-bar interest" id="chartInterest" style="height: 50%;">
                    <div class="tooltip" id="tooltipInterest">Interest</div>
                </div>
            </div>
            <div class="chart-labels">
                <span>
                    <span class="icon">🔵</span>
                    Principal
                </span>
                <span>
                    <span class="icon">🔴</span>
                    Interest
                </span>
            </div>
        </div>
    </div>
    <div class="footer-tools">
        <button class="footer-tool" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>
    </div>
    
    <script>
        const loanAmountInput = document.getElementById('loanAmount');
        const interestRateInput = document.getElementById('interestRate');
        const loanTermInput = document.getElementById('loanTerm');
        const interestRateValue = document.getElementById('interestRateValue');
        const loanTermValue = document.getElementById('loanTermValue');
        const results = document.getElementById('results');
        
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount);
        }
        
        function updateSliders() {
            interestRateValue.textContent = interestRateInput.value + '%';
            loanTermValue.textContent = loanTermInput.value + ' years';
        }
        
        function calculateMortgage() {
            const loanAmount = parseFloat(loanAmountInput.value) || 0;
            const interestRate = parseFloat(interestRateInput.value) || 0;
            const loanTerm = parseInt(loanTermInput.value) || 0;
            
            if (loanAmount <= 0) {
                alert('Please enter a valid loan amount');
                return;
            }
            
            const monthlyRate = interestRate / 100 / 12;
            const numberOfPayments = loanTerm * 12;
            
            let monthlyPayment = 0;
            if (monthlyRate === 0) {
                monthlyPayment = loanAmount / numberOfPayments;
            } else {
                monthlyPayment = loanAmount * monthlyRate * Math.pow(1 + monthlyRate, numberOfPayments) / 
                               (Math.pow(1 + monthlyRate, numberOfPayments) - 1);
            }
            
            const totalPayment = monthlyPayment * numberOfPayments;
            const totalInterest = totalPayment - loanAmount;
            
            const now = new Date();
            const payoffDate = new Date(now.getFullYear() + loanTerm, now.getMonth());
            const payoffDateString = payoffDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
            
            document.getElementById('monthlyPayment').textContent = formatCurrency(monthlyPayment);
            document.getElementById('totalPayment').textContent = formatCurrency(totalPayment);
            document.getElementById('totalInterest').textContent = formatCurrency(totalInterest);
            document.getElementById('payoffDate').textContent = payoffDateString;
            
            document.getElementById('breakdownPrincipal').textContent = formatCurrency(loanAmount);
            document.getElementById('breakdownInterest').textContent = formatCurrency(totalInterest);
            
            const total = totalPayment;
            const principalPercent = (loanAmount / total) * 100;
            const interestPercent = (totalInterest / total) * 100;
            
            document.getElementById('chartPrincipal').style.height = principalPercent + '%';
            document.getElementById('chartInterest').style.height = interestPercent + '%';
            
            document.getElementById('tooltipPrincipal').textContent = formatCurrency(loanAmount);
            document.getElementById('tooltipInterest').textContent = formatCurrency(totalInterest);
            
            results.style.display = 'block';
        }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        const translations = {
            en: {
                title: 'Mortgage Calculator',
                back: '← Back to Home',
                loanAmount: 'Loan Amount',
                interestRate: 'Interest Rate',
                loanTerm: 'Loan Term',
                calculate: 'Calculate',
                results: 'Calculation Results',
                monthlyPayment: 'Monthly Payment',
                totalPayment: 'Total Payment',
                totalInterest: 'Total Interest',
                payoffDate: 'Payoff Date'
            },
            'zh-CN': {
                title: '房贷计算器',
                back: '← 返回首页',
                loanAmount: '贷款金额',
                interestRate: '利率',
                loanTerm: '贷款期限',
                calculate: '计算',
                results: '计算结果',
                monthlyPayment: '每月付款',
                totalPayment: '总付款',
                totalInterest: '总利息',
                payoffDate: '结清日期'
            },
            'zh-TW': {
                title: '房貸計算器',
                back: '← 返回首頁',
                loanAmount: '貸款金額',
                interestRate: '利率',
                loanTerm: '貸款期限',
                calculate: '計算',
                results: '計算結果',
                monthlyPayment: '每月付款',
                totalPayment: '總付款',
                totalInterest: '總利息',
                payoffDate: '結清日期'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            document.querySelector('a').textContent = t.back;
            
            const labels = document.querySelectorAll('.calculator label');
            labels[0].textContent = t.loanAmount;
            labels[1].textContent = t.interestRate;
            labels[2].textContent = t.loanTerm;
            
            const buttons = document.querySelectorAll('.btn-calculate');
            buttons[0].textContent = t.calculate;
            
            const resultHeaders = document.querySelectorAll('.results h3');
            resultHeaders[0].textContent = t.results;
            
            const resultLabels = document.querySelectorAll('.result-card .label');
            resultLabels[0].textContent = t.monthlyPayment;
            resultLabels[1].textContent = t.totalPayment;
            resultLabels[2].textContent = t.totalInterest;
            resultLabels[3].textContent = t.payoffDate;
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
        
        function updateSliderValue(e) {
            interestRateValue.textContent = interestRateInput.value + '%';
            loanTermValue.textContent = loanTermInput.value + ' years';
        }
        
        interestRateInput.addEventListener('input', updateSliderValue);
        loanTermInput.addEventListener('input', updateSliderValue);
        
        interestRateInput.addEventListener('mousedown', updateSliderValue);
        loanTermInput.addEventListener('mousedown', updateSliderValue);
        
        interestRateInput.addEventListener('touchstart', updateSliderValue);
        loanTermInput.addEventListener('touchstart', updateSliderValue);
        
        updateSliderValue();
    </script>
</body>
