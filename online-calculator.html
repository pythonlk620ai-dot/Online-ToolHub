<body>
    <div class="calculator">
        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">

        <h1>Free Online Calculator</h1>
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('basic')">Basic</button>
            <button class="mode-btn" onclick="setMode('scientific')">Scientific</button>
        </div>
        <div class="display-container">
            <div class="history" id="history"></div>
            <div class="display" id="display">0</div>

    <script>
        let currentDisplay = '0';
        let shouldResetDisplay = false;
        let memory = 0;
        let history = '';
        let lastWasOperator = false;
        let isScientificMode = false;

        const displayElement = document.getElementById('display');
        const historyElement = document.getElementById('history');
        const buttonsContainer = document.getElementById('buttonsContainer');

        function updateDisplay() {
            displayElement.textContent = currentDisplay;
        }

        function updateHistory() {
            historyElement.textContent = history;
        }

        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentDisplay = '0';
                shouldResetDisplay = false;
                history = '';
                updateHistory();
            }
            if (currentDisplay === '0') {
                currentDisplay = number;
            } else {
                currentDisplay += number;
            }
            lastWasOperator = false;
            updateDisplay();
        }

        function appendOperator(operator) {
            shouldResetDisplay = false;
            lastWasOperator = true;
            const lastChar = currentDisplay.slice(-1);
            if (['+', '-', '*', '/'].includes(lastChar)) {
                currentDisplay = currentDisplay.slice(0, -1) + operator;
            } else {
                currentDisplay += operator;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentDisplay = '0';
            shouldResetDisplay = false;
            history = '';
            lastWasOperator = false;
            updateDisplay();
            updateHistory();
        }

        function deleteLast() {
            if (shouldResetDisplay) {
                currentDisplay = '0';
                shouldResetDisplay = false;
                history = '';
                updateHistory();
                updateDisplay();
                return;
            }
            if (currentDisplay.length === 1 || (currentDisplay.length === 2 && currentDisplay.startsWith('-'))) {
                currentDisplay = '0';
            } else {
                currentDisplay = currentDisplay.slice(0, -1);
            }
            updateDisplay();
        }

        function calculate() {
            try {
                let expression = currentDisplay;
                history = currentDisplay + ' =';
                
                expression = expression.replace(/×/g, '*').replace(/÷/g, '/');
                
                if (expression.includes('xʸ')) {
                    const parts = expression.split('xʸ');
                    if (parts.length === 2) {
                        expression = 'Math.pow(' + parts[0] + ',' + parts[1] + ')';
                    }
                }
                
                expression = expression.replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/√\(/g, 'Math.sqrt(')
                    .replace(/π/g, 'Math.PI')
                    .replace(/e/g, 'Math.E')
                    .replace(/²/g, '**2')
                    .replace(/%/g, '/100');
                
                if (expression.includes('!')) {
                    expression = processFactorial(expression);
                }
                
                const result = eval(expression);
                
                if (!isFinite(result) || isNaN(result)) {
                    currentDisplay = 'Error';
                } else {
                    currentDisplay = parseFloat(result.toFixed(10)).toString();
                }
                shouldResetDisplay = true;
            } catch (error) {
                currentDisplay = 'Error';
                shouldResetDisplay = true;
            }
            updateDisplay();
            updateHistory();
        }

        function processFactorial(expr) {
            const factorialRegex = /(\d+)!/g;
            let match;
            while ((match = factorialRegex.exec(expr)) !== null) {
                const num = parseInt(match[1]);
                let result = 1;
                for (let i = 2; i <= num; i++) {
                    result *= i;
                }
                expr = expr.replace(match[0], result);
            }
            return expr;
        }

        function square() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = currentDisplay + '²';
                shouldResetDisplay = true;
            } else {
                currentDisplay += '²';
            }
            updateDisplay();
        }

        function squareRoot() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = '√(' + currentDisplay + ')';
                shouldResetDisplay = true;
            } else {
                currentDisplay += '√(';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function percentage() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = currentDisplay + '%';
                shouldResetDisplay = true;
            } else {
                currentDisplay += '%';
            }
            updateDisplay();
        }

        function negate() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = currentDisplay.startsWith('-') 
                    ? currentDisplay.slice(1) 
                    : '-' + currentDisplay;
            }
            updateDisplay();
        }

        function sin() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = 'sin(' + currentDisplay + ')';
                shouldResetDisplay = true;
            } else {
                currentDisplay += 'sin(';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function cos() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = 'cos(' + currentDisplay + ')';
                shouldResetDisplay = true;
            } else {
                currentDisplay += 'cos(';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function tan() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = 'tan(' + currentDisplay + ')';
                shouldResetDisplay = true;
            } else {
                currentDisplay += 'tan(';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function log() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = 'log(' + currentDisplay + ')';
                shouldResetDisplay = true;
            } else {
                currentDisplay += 'log(';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function ln() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = 'ln(' + currentDisplay + ')';
                shouldResetDisplay = true;
            } else {
                currentDisplay += 'ln(';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function factorial() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = currentDisplay + '!';
                shouldResetDisplay = true;
            } else {
                currentDisplay += '!';
            }
            lastWasOperator = true;
            updateDisplay();
        }

        function power() {
            if (!currentDisplay.match(/[+\-*/²%]$/)) {
                currentDisplay = currentDisplay + 'xʸ';
                lastWasOperator = true;
            } else {
                currentDisplay += 'xʸ';
                lastWasOperator = true;
            }
            updateDisplay();
        }

        function pi() {
            if (!currentDisplay.match(/[+\-*/²%]$/) && currentDisplay !== '0') {
                currentDisplay += '*π';
            } else {
                currentDisplay += 'π';
            }
            shouldResetDisplay = true;
            updateDisplay();
        }

        function e() {
            if (!currentDisplay.match(/[+\-*/²%]$/) && currentDisplay !== '0') {
                currentDisplay += '*e';
            } else {
                currentDisplay += 'e';
            }
            shouldResetDisplay = true;
            updateDisplay();
        }

        function memoryClear() {
            memory = 0;
            history = 'MC';
            updateHistory();
        }

        function memoryRead() {
            currentDisplay = memory.toString();
            history = 'MR';
            shouldResetDisplay = true;
            updateDisplay();
            updateHistory();
        }

        function memoryAdd() {
            memory += parseFloat(currentDisplay);
            history = 'M+';
            updateHistory();
        }

        function memorySubtract() {
            memory -= parseFloat(currentDisplay);
            history = 'M-';
            updateHistory();
        }

        function setMode(mode) {
            isScientificMode = mode === 'scientific';
            
            const basicBtn = document.querySelector('.mode-btn:nth-child(1)');
            const sciBtn = document.querySelector('.mode-btn:nth-child(2)');
            
            if (isScientificMode) {
                basicBtn.classList.remove('active');
                sciBtn.classList.add('active');
                buttonsContainer.classList.add('scientific');
                renderScientificButtons();
            } else {
                basicBtn.classList.add('active');
                sciBtn.classList.remove('active');
                buttonsContainer.classList.remove('scientific');
                renderBasicButtons();
            }
        }

        function renderBasicButtons() {
            buttonsContainer.innerHTML = `
                <button class="btn-clear" onclick="clearDisplay()">C</button>
                <button class="btn-delete" onclick="deleteLast()">⌫</button>
                <button class="btn-operator" onclick="appendOperator('/')">÷</button>
                <button class="btn-operator" onclick="appendOperator('*')">×</button>
                <button class="btn-operator" onclick="appendOperator('-')">−</button>
                <button class="btn-operator" onclick="appendOperator('+')">+</button>
                
                <button class="btn-number" onclick="appendNumber('7')">7</button>
                <button class="btn-number" onclick="appendNumber('8')">8</button>
                <button class="btn-number" onclick="appendNumber('9')">9</button>
                <button class="btn-number" onclick="appendNumber('4')">4</button>
                <button class="btn-number" onclick="appendNumber('5')">5</button>
                <button class="btn-number" onclick="appendNumber('6')">6</button>
                
                <button class="btn-number" onclick="appendNumber('1')">1</button>
                <button class="btn-number" onclick="appendNumber('2')">2</button>
                <button class="btn-number" onclick="appendNumber('3')">3</button>
                <button class="btn-number" onclick="appendNumber('0')" style="grid-column: span 2; width: 100%">0</button>
                <button class="btn-number" onclick="appendNumber('.')">.</button>
                <button class="btn-equal" onclick="calculate()">=</button>
            `;
        }

        function renderScientificButtons() {
            buttonsContainer.innerHTML = `
                <button class="btn-memory" onclick="memoryClear()">MC</button>
                <button class="btn-memory" onclick="memoryRead()">MR</button>
                <button class="btn-memory" onclick="memoryAdd()">M+</button>
                <button class="btn-memory" onclick="memorySubtract()">M-</button>
                <button class="btn-clear" onclick="clearDisplay()">C</button>
                
                <button class="btn-sci" onclick="square()">x²</button>
                <button class="btn-sci" onclick="squareRoot()">√</button>
                <button class="btn-sci" onclick="percentage()">%</button>
                <button class="btn-delete" onclick="deleteLast()">⌫</button>
                <button class="btn-operator" onclick="appendOperator('/')">÷</button>
                
                <button class="btn-sci" onclick="sin()">sin</button>
                <button class="btn-number" onclick="appendNumber('7')">7</button>
                <button class="btn-number" onclick="appendNumber('8')">8</button>
                <button class="btn-number" onclick="appendNumber('9')">9</button>
                <button class="btn-operator" onclick="appendOperator('*')">×</button>
                
                <button class="btn-sci" onclick="cos()">cos</button>
                <button class="btn-number" onclick="appendNumber('4')">4</button>
                <button class="btn-number" onclick="appendNumber('5')">5</button>
                <button class="btn-number" onclick="appendNumber('6')">6</button>
                <button class="btn-operator" onclick="appendOperator('-')">−</button>
                
                <button class="btn-sci" onclick="tan()">tan</button>
                <button class="btn-number" onclick="appendNumber('1')">1</button>
                <button class="btn-number" onclick="appendNumber('2')">2</button>
                <button class="btn-number" onclick="appendNumber('3')">3</button>
                <button class="btn-operator" onclick="appendOperator('+')">+</button>
                
                <button class="btn-sci" onclick="log()">log</button>
                <button class="btn-sci" onclick="ln()">ln</button>
                <button class="btn-number" onclick="appendNumber('0')" style="grid-column: span 2; width: 100%">0</button>
                <button class="btn-number" onclick="appendNumber('.')">.</button>
                <button class="btn-equal" onclick="calculate()">=</button>
                
                <button class="btn-sci" onclick="factorial()">n!</button>
                <button class="btn-sci" onclick="power()">xʸ</button>
                <button class="btn-sci" onclick="pi()">π</button>
                <button class="btn-sci" onclick="e()">e</button>
                <button class="btn-sci" onclick="negate()">±</button>
            `;
        }

        setMode('basic');

        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') {
                appendNumber(e.key);
            } else if (e.key === '.') {
                appendNumber('.');
            } else if (e.key === '+' || e.key === '-') {
                appendOperator(e.key);
            } else if (e.key === '*') {
                appendOperator('*');
            } else if (e.key === '/') {
                e.preventDefault();
                appendOperator('/');
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Backspace') {
                deleteLast();
            } else if (e.key === 'Escape') {
                clearDisplay();
            }
        });
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }

            },
            'zh-TW': {
                title: '免費線上計算器',
                back: '← 返回首頁',
                basic: '基本',
                scientific: '科學',
                clear: '清除',
                delete: '刪除',
                divide: '÷',
                multiply: '×',
                minus: '−',
                plus: '+',
                equal: '=',
                sin: '正弦',
                cos: '餘弦',
                tan: '正切',
                log: '對數',
                ln: '自然對數',
                sqrt: '平方根',
                percent: '百分比',
                factorial: '階乘',
                power: '次方',
                pi: '圓周率',
                negate: '正負'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            document.querySelector('.back-link a').textContent = t.back;
            
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns[0].textContent = t.basic;
            modeBtns[1].textContent = t.scientific;
            
            const basicBtns = document.querySelectorAll('.btn-clear, .btn-delete, .btn-operator, .btn-number, .btn-equal');
            basicBtns[0].textContent = t.clear;
            basicBtns[1].textContent = t.delete;
            basicBtns[2].textContent = t.divide;
            basicBtns[3].textContent = t.multiply;
            basicBtns[4].textContent = t.minus;
            basicBtns[5].textContent = t.plus;
            basicBtns[6].textContent = t.equal;
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
    </script>
</body>
</html>
