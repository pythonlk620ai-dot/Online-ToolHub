<body>
    <div class="timer-container">
       <!-- <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>

        <h1>Free Online Stopwatch</h1>
        <div class="mode-selector">
            <div class="mode-card stopwatch active" id="stopwatchCard" onclick="setMode('stopwatch')">
                <div class="mode-title">Stopwatch</div>
                <div class="mode-arrow">⬆</div>
            </div>
            <div class="mode-card countdown" id="countdownCard" onclick="setMode('countdown')">
                <div class="mode-title">Countdown</div>
                <div class="mode-arrow">⬇</div>
            </div>
        </div>
        <div class="display-container">
            <div class="time-display" id="display">00:00:00</div>
            <div class="milliseconds" id="milliseconds">000</div>
        </div>
        <div class="buttons">
            <button class="btn-start" id="startBtn" onclick="startTimer()">Start</button>
            <button class="btn-stop" id="stopBtn" onclick="stopTimer()" disabled>Stop</button>
            <button class="btn-clear" onclick="resetTimer()">Clear</button>
        </div>
        <div class="numpad hidden" id="numpad">
            <button class="num-btn" onclick="appendNumber(5)">5</button>
            <button class="num-btn" onclick="appendNumber(6)">6</button>
            <button class="num-btn" onclick="appendNumber(7)">7</button>
            <button class="num-btn" onclick="appendNumber(8)">8</button>
            <button class="num-btn" onclick="appendNumber(9)">9</button>
            <button class="num-btn" onclick="setCountdownTime()">Set</button>
            <button class="num-btn" onclick="appendNumber(0)">0</button>
            <button class="num-btn" onclick="appendNumber(1)">1</button>
            <button class="num-btn" onclick="appendNumber(2)">2</button>
            <button class="num-btn" onclick="appendNumber(3)">3</button>
            <button class="num-btn" onclick="appendNumber(4)">4</button>
            <button class="num-btn clear" onclick="resetTimer()">Clear</button>
        </div>
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>
    <div class="footer-tools">
        <button class="footer-tool" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>
    </div>

    <script>
        let totalSeconds = 0;
        let currentSeconds = 0;
        let milliseconds = 0;
        let timerInterval = null;
        let isRunning = false;
        let mode = 'stopwatch';
        let countdownInput = '';

        const displayElement = document.getElementById('display');
        const millisecondsElement = document.getElementById('milliseconds');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const numpad = document.getElementById('numpad');
        const stopwatchCard = document.getElementById('stopwatchCard');
        const countdownCard = document.getElementById('countdownCard');

        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secondsLeft = seconds % 60;
            
            return `${pad(hours)}:${pad(minutes)}:${pad(secondsLeft)}`;
        }

        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        function updateDisplay() {
            displayElement.textContent = formatTime(currentSeconds);
            millisecondsElement.textContent = pad(milliseconds);
        }

        function setMode(selectedMode) {
            mode = selectedMode;
            
            if (mode === 'stopwatch') {
                stopwatchCard.classList.add('active');
                countdownCard.classList.remove('active');
                numpad.classList.add('hidden');
                startBtn.textContent = t.start;
                startBtn.className = 'btn-start';
            } else {
                stopwatchCard.classList.remove('active');
                countdownCard.classList.add('active');
                numpad.classList.remove('hidden');
                startBtn.textContent = t.start;
                startBtn.className = 'btn-start';
            }
            
            resetTimer();
        }

        function appendNumber(num) {
            if (countdownInput.length < 6) {
                countdownInput += num;
                updateCountdownDisplay();
            }
        }

        function updateCountdownDisplay() {
            const padded = countdownInput.padStart(6, '0');
            const hours = padded.substring(0, 2);
            const minutes = padded.substring(2, 4);
            const seconds = padded.substring(4, 6);
            displayElement.textContent = `${hours}:${minutes}:${seconds}`;
            millisecondsElement.textContent = '000';
        }

        function setCountdownTime() {
            if (countdownInput) {
                const padded = countdownInput.padStart(6, '0');
                const hours = parseInt(padded.substring(0, 2)) || 0;
                const minutes = parseInt(padded.substring(2, 4)) || 0;
                const seconds = parseInt(padded.substring(4, 6)) || 0;
                
                totalSeconds = hours * 3600 + minutes * 60 + seconds;
                currentSeconds = totalSeconds;
                
                if (currentSeconds > 0) {
                    updateDisplay();
                    countdownInput = '';
                }
            }
        }

        function startTimer() {
            if (!isRunning) {
                if (mode === 'countdown' && countdownInput) {
                    setCountdownTime();
                }
                
                isRunning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;

                let startTime = Date.now();
                let lastMilliseconds = milliseconds;

                timerInterval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    
                    if (mode === 'stopwatch') {
                        milliseconds = Math.floor((elapsed % 1000) / 10);
                        const elapsedSeconds = Math.floor(elapsed / 1000);
                        currentSeconds = elapsedSeconds;
                        updateDisplay();
                    } else {
                        const newMilliseconds = Math.floor((elapsed % 1000) / 10);
                        if (newMilliseconds < lastMilliseconds && currentSeconds > 0) {
                            currentSeconds--;
                            updateDisplay();
                            
                            if (currentSeconds <= 0) {
                                stopTimer();
                                playAlarm();
                            }
                        }
                        lastMilliseconds = newMilliseconds;
                        milliseconds = newMilliseconds;
                        updateDisplay();
                    }
                }, 10);
            }
        }

        function stopTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function resetTimer() {
            stopTimer();
            currentSeconds = 0;
            totalSeconds = 0;
            milliseconds = 0;
            countdownInput = '';
            updateDisplay();
        }

        function playAlarm() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
            
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1);

            setTimeout(() => {
                oscillator.frequency.setValueAtTime(660, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 1);
            }, 1000);
        }

        hoursInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2);
        });

        minutesInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2);
        });

        secondsInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2);
        });

        updateDisplay();
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        const translations = {
            en: {
                title: 'Timer',
                back: '← Back to Home',
                stopwatch: 'Stopwatch',
                countdown: 'Countdown',
                start: 'Start',
                stop: 'Stop',
                clear: 'Clear',
                set: 'Set',
                up: '⬆',
                down: '⬇',
                displayZero: '00:00:00',
                millisecondsZero: '000'
            },
            'zh-CN': {
                title: '计时器',
                back: '← 返回首页',
                stopwatch: '秒表',
                countdown: '倒计时',
                start: '开始',
                stop: '停止',
                clear: '清除',
                set: '设定',
                up: '⬆',
                down: '⬇',
                displayZero: '00:00:00',
                millisecondsZero: '000'
            },
            'zh-TW': {
                title: '計時器',
                back: '← 返回首頁',
                stopwatch: '秒表',
                countdown: '倒計時',
                start: '開始',
                stop: '停止',
                clear: '清除',
                set: '設定',
                up: '⬆',
                down: '⬇',
                displayZero: '00:00:00',
                millisecondsZero: '000'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            
            const backLink = document.querySelector('a[href="index.html"]');
            if (backLink) {
                backLink.textContent = t.back;
            }
            
            const modeCards = document.querySelectorAll('.mode-title');
            if (modeCards.length > 0) modeCards[0].textContent = t.stopwatch;
            if (modeCards.length > 1) modeCards[1].textContent = t.countdown;
            
            const arrows = document.querySelectorAll('.mode-arrow');
            if (arrows.length > 0) arrows[0].textContent = t.up;
            if (arrows.length > 1) arrows[1].textContent = t.down;
            
            const buttons = document.querySelectorAll('.buttons button');
            if (buttons.length > 0) buttons[0].textContent = t.start;
            if (buttons.length > 1) buttons[1].textContent = t.stop;
            if (buttons.length > 2) buttons[2].textContent = t.clear;
            
            const numpadBtns = document.querySelectorAll('.numpad .num-btn');
            if (numpadBtns.length > 5) numpadBtns[5].textContent = t.set;
            if (numpadBtns.length > 11) numpadBtns[11].textContent = t.clear;
            
            if (startBtn) {
                startBtn.textContent = t.start;
            }
            
            if (displayElement) {
                displayElement.textContent = t.displayZero;
            }
            if (millisecondsElement) {
                millisecondsElement.textContent = t.millisecondsZero;
            }
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
    </script>
