<body>
    <div class="container">
        <!--<div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>
                <option value="zh-CN">简体中文</option>

        <h1>QR Code Generator</h1>
        <div class="input-group">
            <label for="textInput">Enter your text:</label>
            <textarea id="textInput" placeholder="Enter text or URL here..."></textarea>
        </div>
        <button onclick="generateQR()">Generate QR Code</button>
        <p class="error" id="error">Please enter some text to generate a QR code</p>
        <div id="qrContainer">
            <div id="qrCode"></div>
            <button class="download-btn" onclick="downloadQR()">Download QR Code</button>
        </div>
        <div style="margin-top: 30px;">
            <a href="index.html" style="color: #667eea; text-decoration: none; font-weight: 600;">← Back to Home</a>
        </div>
    </div>
    <div class="footer-tools">
        <button class="footer-tool" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let qrcode = null;

        function generateQR() {
            const textInput = document.getElementById('textInput');
            const error = document.getElementById('error');
            const qrContainer = document.getElementById('qrContainer');
            const qrCode = document.getElementById('qrCode');

            const text = textInput.value.trim();

            if (!text) {
                error.classList.add('show');
                return;
            }

            error.classList.remove('show');
            qrCode.innerHTML = '';
            
            qrcode = new QRCode(qrCode, {
                text: text,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            qrContainer.classList.add('show');
        }

        function downloadQR() {
            if (!qrcode) {
                return;
            }

            const qrCode = document.getElementById('qrCode');
            const canvas = qrCode.querySelector('canvas');
            const img = document.getElementById('qrCodeImg');

            let dataURL;
            if (canvas) {
                dataURL = canvas.toDataURL('image/png');
            } else if (img) {
                dataURL = img.src;
            } else {
                return;
            }

            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                generateQR();
            }
        });
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        const translations = {
            en: {
                title: 'QR Code Generator',
                back: '← Back to Home',
                label: 'Enter your text:',
                placeholder: 'Enter text or URL here...',
                button: 'Generate QR Code',
                error: 'Please enter some text to generate a QR code',
                download: 'Download QR Code'
            },
            'zh-CN': {
                title: '二维码生成器',
                back: '← 返回首页',
                label: '输入您的文字：',
                placeholder: '在此输入文字或网址...',
                button: '生成二维码',
                error: '请输入一些文字以生成二维码',
                download: '下载你的二维码'
            },
            'zh-TW': {
                title: '二維碼生成器',
                back: '← 返回首頁',
                label: '輸入您的文字：',
                placeholder: '在此輸入文字或網址...',
                button: '生成二維碼',
                error: '請輸入一些文字以生成二維碼',
                download: '  下載你的二維碼  '
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            
            const backLink = document.querySelector('a[href="index.html"]');
            if (backLink) {
                backLink.textContent = t.back;
            }
            
            const label = document.querySelector('label[for="textInput"]');
            if (label) {
                label.textContent = t.label;
            }
            
            const textarea = document.getElementById('textInput');
            if (textarea) {
                textarea.placeholder = t.placeholder;
            }
            
            const generateBtn = document.querySelector('button[onclick="generateQR()"]');
            if (generateBtn) {
                generateBtn.textContent = t.button;
            }
            
            const error = document.getElementById('error');
            if (error) {
                error.textContent = t.error;
            }
            
            const downloadBtn = document.querySelector('.download-btn');
            if (downloadBtn) {
                downloadBtn.textContent = t.download;
            }
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
    </script>
