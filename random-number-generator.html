            box-shadow: 0 8px 20px rgba(238, 82, 83, 0.4), inset 0 -5px 10px rgba(0, 0, 0, 0.2);

            animation: bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);

<body>
    <div class="container">
        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">中文繁體</option>
            </select>
        </div>
        <header>
            <h1>🎲 Random Number Generator</h1>
            <a href="index.html">← Back to Home</a>
        </header>
        
        <div class="settings-panel">
            <div class="input-group">
                <label>Number Range</label>
                <div class="range-inputs">
                    <input type="number" id="minRange" min="1" value="1" placeholder="Min">
                    <span>-</span>
                    <input type="number" id="maxRange" max="1000" value="100" placeholder="Max">
                </div>
            </div>
            <div class="input-group">
                <label>Numbers to Pick</label>
                <input type="number" id="numbersToPick" min="1" max="100" value="6" placeholder="How many numbers">
            </div>
            <div class="input-group">
                <label>Draw Times</label>
                <input type="number" id="drawTimes" min="1" max="50" value="5" placeholder="How many draws">
            </div>
            <button class="btn-generate" onclick="generateNumbers()">🎲 Generate Numbers</button>
        </div>
        
        <div class="results-container" id="resultsContainer">
            <div class="draws-container" id="drawsContainer"></div>
        </div>
    </div>
    <div class="footer-tools">
        <button class="footer-tool" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>
    </div>
    
    <script>
        function generateNumbers() {
            const minRange = parseInt(document.getElementById('minRange').value) || 1;
            const maxRange = parseInt(document.getElementById('maxRange').value) || 100;
            const numbersToPick = parseInt(document.getElementById('numbersToPick').value) || 6;
            const drawTimes = parseInt(document.getElementById('drawTimes').value) || 5;
            
            if (minRange >= maxRange) {
                alert('Minimum range must be less than maximum range');
                return;
            }
            
            if (numbersToPick > (maxRange - minRange + 1)) {
                alert(`Cannot pick ${numbersToPick} unique numbers from range ${minRange}-${maxRange}`);
                return;
            }
            
            const drawsContainer = document.getElementById('drawsContainer');
            drawsContainer.innerHTML = '';
            
            for (let draw = 1; draw <= drawTimes; draw++) {
                const numbers = [];
                const usedNumbers = new Set();
                
                while (numbers.length < numbersToPick) {
                    const randomNum = Math.floor(Math.random() * (maxRange - minRange + 1)) + minRange;
                    if (!usedNumbers.has(randomNum)) {
                        numbers.push(randomNum);
                        usedNumbers.add(randomNum);
                    }
                }
                
                numbers.sort((a, b) => a - b);
                
                const drawCard = document.createElement('div');
                drawCard.className = 'draw-card';
                
                let numbersHTML = '';
                numbers.forEach((num, index) => {
                    numbersHTML += `<div class="cartoon-number" style="animation-delay: ${0.1 + index * 0.1}s">${num}</div>`;
                });
                
                drawCard.innerHTML = `
                    <h3>Draw #${draw}</h3>
                    <div class="numbers-grid">
                        ${numbersHTML}
                    </div>
                `;
                
                drawsContainer.appendChild(drawCard);
            }
        }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        const translations = {
            en: {
                title: 'Random Number Generator',
                back: '← Back to Home',
                range: 'Number Range',
                min: 'Min',
                max: 'Max',
                numbersPick: 'Numbers to Pick',
                numbersPickPlaceholder: 'How many numbers',
                drawTimes: 'Draw Times',
                drawTimesPlaceholder: 'How many draws',
                generate: '🎲 Generate Numbers'
            },
            'zh-CN': {
                title: '随机数生成器',
                back: '← 返回首页',
                range: '数字范围',
                min: '最小值',
                max: '最大值',
                numbersPick: '选择数量',
                numbersPickPlaceholder: '选择多少个数字',
                drawTimes: '抽取次数',
                drawTimesPlaceholder: '抽取多少次',
                generate: '🎲 生成数字'
            },
            'zh-TW': {
                title: '隨機數生成器',
                back: '← 返回首頁',
                range: '數字範圍',
                min: '最小值',
                max: '最大值',
                numbersPick: '選擇數量',
                numbersPickPlaceholder: '選擇多少個數字',
                drawTimes: '抽取次數',
                drawTimesPlaceholder: '抽取多少次',
                generate: '🎲 生成數字'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            document.querySelector('a').textContent = t.back;
            
            const labels = document.querySelectorAll('.settings-panel label');
            labels[0].textContent = t.range;
            labels[1].textContent = t.numbersPick;
            labels[2].textContent = t.drawTimes;
            
            const inputs = document.querySelectorAll('input');
            inputs[0].placeholder = t.min;
            inputs[1].placeholder = t.max;
            inputs[2].placeholder = t.numbersPickPlaceholder;
            inputs[3].placeholder = t.drawTimesPlaceholder;
            
            const buttons = document.querySelectorAll('.settings-panel button');
            buttons[0].textContent = t.generate;
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
    </script>
</body>
