<body>
    <div class="container">
        <div class="language-selector">
            <select id="languageSelect" onchange="changeLanguage(this.value)">
                <option value="en" selected>English</option>
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">中文繁體</option>
            </select>
        </div>
        <header>
            <h1>🔑 Password Generator</h1>
            <a href="index.html">← Back to Home</a>
        </header>
        
        <div class="generator">
            <div class="password-display" id="passwordDisplay">
                <span id="password">Click Generate</span>
                <button class="copy-btn" onclick="copyPassword()">📋 Copy</button>
            </div>
            
            <div class="settings-group">
                <label>Password Length</label>
                <div class="length-display" id="lengthDisplay">12 characters</div>
                <input type="range" id="length" min="6" max="50" step="1" value="12">
            </div>
            
            <div class="settings-group">
                <label>Character Types</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="lowercase" checked>
                        <span>Lowercase (a-z)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="uppercase" checked>
                        <span>Uppercase (A-Z)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="numbers" checked>
                        <span>Numbers (0-9)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="symbols">
                        <span>Symbols (!@#$)</span>
                    </label>
                </div>
            </div>
            
            <button class="btn-generate" onclick="generatePassword()">Generate Password</button>
            
            <div class="strength-meter">
                <h4>Password Strength</h4>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
        </div>
    </div>
    <div class="footer-tools">
        <button class="footer-tool" onclick="toggleFullScreen()" title="Toggle Full Screen">⛶</button>
    </div>
    
    <script>
        const lengthInput = document.getElementById('length');
        const lengthDisplay = document.getElementById('lengthDisplay');
        const passwordDisplay = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        
        const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
        const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numberChars = '0123456789';
        const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';
        
        function updateLength() {
            lengthDisplay.textContent = lengthInput.value + ' characters';
        }
        
        function generatePassword() {
            let chars = '';
            
            if (document.getElementById('lowercase').checked) {
                chars += lowercaseChars;
            }
            if (document.getElementById('uppercase').checked) {
                chars += uppercaseChars;
            }
            if (document.getElementById('numbers').checked) {
                chars += numberChars;
            }
            if (document.getElementById('symbols').checked) {
                chars += symbolChars;
            }
            
            if (chars === '') {
                alert('Please select at least one character type');
                return;
            }
            
            const length = parseInt(lengthInput.value);
            let password = '';
            
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }
            
            passwordDisplay.textContent = password;
            updateStrength(password);
        }
        
        function updateStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength += 20;
            if (password.length >= 12) strength += 10;
            if (password.length >= 16) strength += 10;
            
            if (/[a-z]/.test(password)) strength += 15;
            if (/[A-Z]/.test(password)) strength += 15;
            if (/[0-9]/.test(password)) strength += 15;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 15;
            
            strengthFill.style.width = strength + '%';
            
            if (strength < 30) {
                strengthFill.style.background = 'linear-gradient(to right, #ff6b6b, #ee5253)';
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#ff6b6b';
            } else if (strength < 60) {
                strengthFill.style.background = 'linear-gradient(to right, #feca57, #ff9f43)';
                strengthText.textContent = 'Moderate';
                strengthText.style.color = '#feca57';
            } else {
                strengthFill.style.background = 'linear-gradient(to right, #1dd1a1, #10ac84)';
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#1dd1a1';
            }
        }
        
        function copyPassword() {
            const password = document.getElementById('password').textContent;
            if (password === 'Click Generate') {
                alert('Please generate a password first');
                return;
            }
            
            navigator.clipboard.writeText(password).then(() => {
                const originalText = document.querySelector('.copy-btn').textContent;
                document.querySelector('.copy-btn').textContent = '✅ Copied!';
                setTimeout(() => {
                    document.querySelector('.copy-btn').textContent = originalText;
                }, 2000);
            });
        }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        const translations = {
            en: {
                title: 'Password Generator',
                back: '← Back to Home',
                passwordLength: 'Password Length',
                characterTypes: 'Character Types',
                lowercase: 'Lowercase (a-z)',
                uppercase: 'Uppercase (A-Z)',
                numbers: 'Numbers (0-9)',
                symbols: 'Symbols (!@#$)',
                generate: 'Generate Password',
                strength: 'Password Strength',
                weak: 'Weak',
                moderate: 'Moderate',
                strong: 'Strong',
                clickGenerate: 'Click Generate',
                copied: '✅ Copied!',
                alertGenerate: 'Please generate a password first'
            },
            'zh-CN': {
                title: '密码生成器',
                back: '← 返回首页',
                passwordLength: '密码长度',
                characterTypes: '字符类型',
                lowercase: '小写 (a-z)',
                uppercase: '大写 (A-Z)',
                numbers: '数字 (0-9)',
                symbols: '符号 (!@#$)',
                generate: '生成密码',
                strength: '密码强度',
                weak: '弱',
                moderate: '中等',
                strong: '强',
                clickGenerate: '点击生成',
                copied: '✅ 已复制！',
                alertGenerate: '请先生成密码'
            },
            'zh-TW': {
                title: '密碼生成器',
                back: '← 返回首頁',
                passwordLength: '密碼長度',
                characterTypes: '字符類型',
                lowercase: '小寫 (a-z)',
                uppercase: '大寫 (A-Z)',
                numbers: '數字 (0-9)',
                symbols: '符號 (!@#$)',
                generate: '生成密碼',
                strength: '密碼強度',
                weak: '弱',
                moderate: '中等',
                strong: '強',
                clickGenerate: '點擊生成',
                copied: '✅ 已複製！',
                alertGenerate: '請先生成密碼'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            document.querySelector('a').textContent = t.back;
            
            const labels = document.querySelectorAll('.settings-group label');
            labels[0].textContent = t.passwordLength;
            labels[1].textContent = t.characterTypes;
            
            const spans = document.querySelectorAll('.checkbox-item span');
            spans[0].textContent = t.lowercase;
            spans[1].textContent = t.uppercase;
            spans[2].textContent = t.numbers;
            spans[3].textContent = t.symbols;
            
            const buttons = document.querySelectorAll('.btn-generate');
            buttons[0].textContent = t.generate;
            
            const strengthLabels = document.querySelectorAll('.strength-meter h4');
            strengthLabels[0].textContent = t.strength;
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
        
        lengthInput.addEventListener('input', updateLength);
        updateLength();
    </script>
</body>
