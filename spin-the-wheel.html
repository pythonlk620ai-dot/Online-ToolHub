        <header>

        <div class="main-content">
            <div class="input-section">
                <h2>📋 Add Items</h2>
                <div class="input-group">

                </div>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="updateWheel()">🔄 Update Wheel</button>
                    <button class="btn btn-secondary" onclick="spinWheel()">🎲 Spin!</button>
                </div>
                <div class="input-group" style="margin-top: 20px;">

            <div class="wheel-section">

                    </div>
                </div>
                <div class="winner-display">
                    <div class="winner-text" id="winnerText">Spin to pick!</div>
                    <button class="btn btn-primary" onclick="spinWheel()" style="font-size: 1.3em; padding: 15px 40px;">🎲 SPIN WHEEL</button>

    <div class="footer-tools">

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let items = [];
        let currentRotation = 0;
        let isSpinning = false;
        
        const colors = [
            ['#ff6b6b', '#ee5253'],
            ['#feca57', '#ff9f43'],
            ['#1dd1a1', '#10ac84'],
            ['#54a0ff', '#2e86de'],
            ['#5f27cd', '#341f97'],
            ['#ff9ff3', '#f368e0'],
            ['#00d2d3', '#54a0ff'],
            ['#ff9f43', '#ee5253'],
            ['#1dd1a1', '#10ac84'],
            ['#54a0ff', '#2e86de']
        ];
        
        function updateWheel() {
            const input = document.getElementById('itemsInput').value;
            items = input.split('\n').filter(item => item.trim() !== '');
            
            if (items.length === 0) {
                document.getElementById('itemsList').innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📝</div>
                        <p>Add items above to create your wheel</p>
                    </div>`;
                drawWheel([]);
                return;
            }
            
            renderItemsList();
            drawWheel(items);
        }
        
        function renderItemsList() {
            const itemsList = document.getElementById('itemsList');
            if (items.length === 0) {
                itemsList.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📝</div>
                        <p>Add items above to create your wheel</p>
                    </div>`;
                return;
            }
            
            let html = '';
            items.forEach((item, index) => {
                html += `<span class="item-tag" onclick="removeItem(${index})">${item} <span class="remove">×</span></span>`;
            });
            itemsList.innerHTML = html;
        }
        
        function removeItem(index) {
            items.splice(index, 1);
            renderItemsList();
            drawWheel(items);
        }
        
        function drawWheel(items) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2 - 10;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (items.length === 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fillStyle = '#dfe6e9';
                ctx.fill();
                ctx.strokeStyle = '#b2bec3';
                ctx.lineWidth = 5;
                ctx.stroke();
                
                ctx.fillStyle = '#636e72';
                ctx.font = 'bold 20px Segoe UI';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Add items to spin!', centerX, centerY);
                return;
            }
            
            const arcSize = (Math.PI * 2) / items.length;
            
            const pointerOffsetAngle = -Math.PI / 2;
            
            items.forEach((item, index) => {
                const startAngle = (items.length - 1 - index) * arcSize + pointerOffsetAngle;
                const endAngle = startAngle + arcSize;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, colors[index % colors.length][0]);
                gradient.addColorStop(1, colors[index % colors.length][1]);
                
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + arcSize / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Segoe UI';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 4;
                ctx.fillText(item, radius - 20, 5);
                ctx.restore();
            });
        }
        
        function updatePointerPosition() {
            const pointer = document.getElementById('pointer');
            pointer.className = 'pointer top';
        }
        
        function spinWheel() {
            if (isSpinning || items.length === 0) {
                if (items.length === 0) {
                    alert('Please add items to the wheel first!');
                }
                return;
            }
            
            isSpinning = true;
            document.getElementById('winnerText').innerHTML = 'Spinning...';
            document.getElementById('winnerText').className = 'winner-text';
            
            const spinDuration = 4000;
            const minSpins = 5;
            const randomSpins = Math.floor(Math.random() * 5) + minSpins;
            const randomDegree = Math.floor(Math.random() * 360);
            
            const pointerOffset = 0;
            
            const totalRotation = currentRotation + (randomSpins * 360) + randomDegree;
            canvas.style.transform = `rotate(${totalRotation}deg)`;
            
            setTimeout(() => {
                isSpinning = false;
                currentRotation = totalRotation % 360;
                
                const normalizedRotation = (totalRotation % 360);
                const arcSize = 360 / items.length;
                const winningIndex = Math.floor(((360 - normalizedRotation + pointerOffset) % 360) / arcSize);
                const winner = items[items.length - 1 - winningIndex];
                
                const winnerText = document.getElementById('winnerText');
                winnerText.innerHTML = `Winner: ${winner}`;
                winnerText.className = 'winner-text winner-highlight';
                
                showWinner(winner);
            }, spinDuration);
        }
        
        function showWinner(winner) {
            let scale = 1;
            const interval = setInterval(() => {
                scale += 0.1;
                if (scale > 1.5) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('winnerText').style.transform = 'scale(1)';
                    }, 500);
                } else {
                    document.getElementById('winnerText').style.transform = `scale(${scale})`;
                }
            }, 100);
        }
        
        updateWheel();
        
        function handleFileUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    items = content.split('\n').filter(item => item.trim() !== '');
                    renderItemsList();
                    drawWheel(items);
                };
                reader.readAsText(file);
            }
        }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable full-screen mode:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        function bookmarkPage() {
            const title = document.title;
            const url = window.location.href;
            
            if (navigator.userAgent.indexOf('iPhone') !== -1 || navigator.userAgent.indexOf('iPad') !== -1) {
                alert('Press the Share button and select "Add to Home Screen"');
            } else if (navigator.userAgent.indexOf('Android') !== -1) {
                alert('Press the menu button and select "Add to Home Screen"');
            } else if (window.sidebar && window.sidebar.addPanel) {
                window.sidebar.addPanel(title, url, '');
            } else if (window.external && 'AddFavorite' in window.external) {
                window.external.AddFavorite(url, title);
            } else {
                alert('Press Ctrl+D to bookmark this page');
            }
        }
        
        const translations = {
            en: {
                title: 'Online Picker Wheel',
                back: '← Back to Home',
                addItems: 'Add Items',
                enterItems: 'Enter items (one per line)',
                example: 'Example:',
                pizza: 'Pizza Place',
                sushi: 'Sushi Bar',
                burger: 'Burger Joint',
                taco: 'Taco Shop',
                italian: 'Italian Restaurant',
                updateWheel: 'Update Wheel',
                spin: 'Spin!',
                uploadFile: 'Upload Text File',
                emptyState: 'Add items above to create your wheel',
                spinning: 'Spinning...',
                winner: 'Winner: ',
                spinToPick: 'Spin to pick!',
                spinWheel: '🎲 SPIN WHEEL'
            },
            'zh-CN': {
                title: '在线选择轮',
                back: '← 返回首页',
                addItems: '添加项目',
                enterItems: '输入项目（每行一个）',
                example: '示例：',
                pizza: '披萨店',
                sushi: '寿司店',
                burger: '汉堡店',
                taco: '墨西哥卷店',
                italian: '意大利餐厅',
                updateWheel: '更新轮盘',
                spin: '旋转！',
                uploadFile: '上传文本文件',
                emptyState: '在上面添加项目以创建您的轮盘',
                spinning: '旋转中...',
                winner: '获胜者：',
                spinToPick: '旋转来选择！',
                spinWheel: '🎲 转动轮盘'
            },
            'zh-TW': {
                title: '線上選擇輪',
                back: '← 返回首頁',
                addItems: '添加項目',
                enterItems: '輸入項目（每行一個）',
                example: '示例：',
                pizza: '披薩店',
                sushi: '壽司店',
                burger: '漢堡店',
                taco: '墨西哥卷店',
                italian: '意大利餐廳',
                updateWheel: '更新輪盤',
                spin: '旋轉！',
                uploadFile: '上傳文本文件',
                emptyState: '在上面添加項目以創建您的輪盤',
                spinning: '旋轉中...',
                winner: '獲勝者：',
                spinToPick: '旋轉來選擇！',
                spinWheel: '🎲 轉動輪盤'
            }
        };
        
        function changeLanguage(lang) {
            const t = translations[lang];
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            
            const backLink = document.querySelector('a[href="index.html"]');
            if (backLink) {
                backLink.textContent = t.back;
            }
            
            const headers = document.querySelectorAll('h2');
            if (headers.length > 0) headers[0].textContent = t.addItems;
            
            const labels = document.querySelectorAll('label');
            if (labels.length > 0) labels[0].textContent = t.enterItems;
            if (labels.length > 1) labels[1].textContent = t.uploadFile;
            
            const placeholders = document.querySelectorAll('textarea');
            if (placeholders.length > 0) {
                placeholders[0].placeholder = `${t.example}\n${t.pizza}\n${t.sushi}\n${t.burger}\n${t.taco}\n${t.italian}`;
            }
            
            const buttons = document.querySelectorAll('.button-group button');
            if (buttons.length > 0) buttons[0].textContent = t.updateWheel;
            if (buttons.length > 1) buttons[1].textContent = t.spin;
            
            const emptyState = document.querySelector('.empty-state p');
            if (emptyState) {
                emptyState.textContent = t.emptyState;
            }
            
            const winnerText = document.getElementById('winnerText');
            if (winnerText) {
                winnerText.textContent = t.spinToPick;
            }
            
            const spinWheelBtn = document.querySelector('.winner-display button[onclick="spinWheel()"]');
            if (spinWheelBtn) {
                spinWheelBtn.textContent = t.spinWheel;
            }
            
            localStorage.setItem('language', lang);
        }
        
        const savedLang = localStorage.getItem('language') || 'en';
        document.getElementById('languageSelect').value = savedLang;
        changeLanguage(savedLang);
    </script>
